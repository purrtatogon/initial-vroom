# Map block for WebSocket upgrade: when client sends Upgrade, nginx forwards "Connection: upgrade"
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 4200;
    server_name localhost;

    # 1. Serve the Angular Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API Requests to Spring Boot
    location /api/ {
        proxy_pass http://backend:8081/; # 'backend' is the docker-compose service name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy WebSocket (vroom-ws) to Spring Boot. Upgrade and Connection headers are required.
    location /vroom-ws/ {
        proxy_pass http://backend:8081/vroom-ws/;
        
        # Critical WebSocket Headers - without these, handshake fails with 403
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Timeouts for long-lived race telemetry
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
