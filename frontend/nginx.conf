# nginx config for serving the Angular SPA and proxying to the Spring Boot backend.
# This creates a single-origin setup: the browser only talks to port 4200,
# and nginx routes /api/ and /vroom-ws/ requests to the backend container.

# WebSocket upgrade map: tells nginx to pass the "Upgrade" header for WebSocket connections
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 4200;
    server_name localhost;

    # 1. Serve Angular static files (HTML, JS, CSS)
    # try_files with /index.html fallback is required for SPA client-side routing —
    # without it, refreshing on /dashboard or /results would return a 404
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy REST API requests to the Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy WebSocket (STOMP/SockJS) to Spring Boot
    # The Upgrade + Connection headers are critical — without them the handshake fails
    location /vroom-ws/ {
        proxy_pass http://backend:8081/vroom-ws/;

        # These headers upgrade the HTTP connection to WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long timeouts so the WebSocket doesn't get killed during a race
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
